{% load static %}

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Child Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link href="{% static 'css/childdash.css' %}" rel="stylesheet" />
  </head>
  <body
    class="bg-light d-flex justify-content-center align-items-center"
    style="min-height: 100vh"
  >
    <div
      class="card shadow-lg border-0 rounded-4 p-4"
      style="max-width: 400px; width: 100%"
    >
      <div class="card-body">
        <h3 class="fw-bold text-center mb-4 text-primary">Child Login</h3>

        <form method="post">
          {% csrf_token %}

          <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input
              type="text"
              name="username"
              id="username"
              class="form-control rounded-pill"
              placeholder="Enter your username"
              required
            />
          </div>

          <div class="mb-3 position-relative">
            <label for="password" class="form-label">Password</label>
            <input
              type="password"
              name="password"
              id="password"
              class="form-control rounded-pill pe-5"
              placeholder="Enter your password"
              required
            />
            <span
              class="position-absolute top-50 end-0 translate-middle-y me-3"
              style="cursor: pointer"
              onclick="togglepin()"
            >
              <i class="fa-regular fa-eye"></i>
            </span>
          </div>

          <button
            type="submit"
            class="btn btn-primary w-100 rounded-pill fw-semibold"
          >
            Login
          </button>
        </form>
      </div>
    </div>
    <script>
      function togglepin() {
        const passwordInput = document.getElementById("password");
        const icon = event.target.closest("span").querySelector("i");

        if (passwordInput.type === "password") {
          passwordInput.type = "text";
          icon.classList.remove("fa-eye");
          icon.classList.add("fa-eye-slash");
        } else {
          passwordInput.type = "password";
          icon.classList.remove("fa-eye-slash");
          icon.classList.add("fa-eye");
        }
      }
    </script>
  </body>
</html>
