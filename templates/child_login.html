{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Child Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{% static 'css/childdash.css' %}" rel="stylesheet">
</head>
<body class="bg-light d-flex justify-content-center align-items-center" style="min-height: 100vh;">

  <div class="card shadow-lg border-0 rounded-4 p-4" style="max-width: 400px; width: 100%;">
    <div class="card-body">
      <h3 class="fw-bold text-center mb-4 text-primary">Child Login</h3>

      <form method="post">
        {% csrf_token %}

        <div class="mb-3">
          <label for="username" class="form-label">Username</label>
          <input type="text" name="username" id="username" class="form-control rounded-pill" placeholder="Enter your username" required>
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">PIN</label>
          <input type="password" name="password" id="password" class="form-control rounded-pill" placeholder="Enter your PIN" required>
        </div>

        <button type="submit" class="btn btn-primary w-100 rounded-pill fw-semibold">Login</button>
      </form>
    </div>
  </div>

</body>
</html>
