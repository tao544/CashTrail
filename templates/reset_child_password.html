{% extends "parentbase.html" %}

{% block content %}

<div class="container-fluid bg-dark text-light min-vh-100 d-flex justify-content-center align-items-center pt-5 pt-lg-0">

  <div class="card bg-dark text-light shadow-lg border-0 rounded-4 p-4"
       style="max-width: 420px; width: 100%;">

    <!-- Header -->
    <div class="text-center mb-4">
      <div class="d-flex justify-content-center align-items-center gap-2 mb-2">
        <i class="fas fa-key fa-lg text-success"></i>
        <h5 class="fw-bold mb-3">Reset Password</h5>
      </div>
      <p class="text-light small mb-0">
        Set a new password for <strong>@{{ child.username }}</strong>
      </p>
    </div>

    <!-- Form -->
    <form method="POST">
      {% csrf_token %}

      <!-- New Password -->
      <div class="mb-3">
  <label class="form-label small">New Password</label>

  <div class="custom-input d-flex align-items-center bg-light">
    <input type="password"
           id="password1"
           name="password1"
           class="form-control flex-grow-1"
           placeholder="Enter new password"
           required>

    <span class="toggle-password ms-2" data-target="password1">
      👁️
    </span>
  </div>
</div>


<div class="mb-3">
  <label class="form-label small">Confirm Password</label>

  <div class="custom-input d-flex align-items-center bg-light">
    <input type="password"
           id="password2"
           name="password2"
           class="form-control flex-grow-1"
           placeholder="Confirm password"
           required>

    <span class="toggle-password ms-2" data-target="password2">
      👁
    </span>
  </div>
</div>
      <!-- Hint -->
      <div class="mb-3">
        <small class="text-light">
          Password should be strong and easy for your child to remember.
        </small>
      </div>

      <!-- Buttons -->
      <div class="text-center">
        <button class="btn btn-success fw-semibold px-4 py-2 rounded-3 w-100" type="submit">
          Reset Password
        </button>
      </div>

      <div class="text-center mt-2">
        <a href="{% url 'mychildren' %}" class="btn btn-outline-light btn-sm rounded-3 px-4 py-2 w-100">
          Cancel
        </a>
      </div>

    </form>

  </div>
</div>

<!-- JS -->
<script>
document.addEventListener("DOMContentLoaded", function () {

  document.querySelectorAll(".toggle-password").forEach(function(toggle) {

    toggle.addEventListener("click", function () {
      const inputId = this.getAttribute("data-target");
      const input = document.getElementById(inputId);

      if (!input) return;

      if (input.type === "password") {
        input.type = "text";
        this.textContent = "👀";
      } else {
        input.type = "password";
        this.textContent = "👁️";
      }
    });

  });

});
</script>

{% endblock %}
