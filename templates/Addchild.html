{% extends "parentbase.html" %}
{% block content %}

<div class="container-fluid bg-dark text-light min-vh-100 d-flex justify-content-center align-items-center  align-items-lg-center
            pt-5 pt-lg-0">

    <div class="card bg-dark text-light shadow-lg border-0 rounded-4 p-4"
         style="max-width: 500px; width: 100%;">

        <h4 class="fw-bold mb-4 text-center text-primary">Add Child Account</h4>

        <form method="POST">
            {% csrf_token %}

            <!-- Full Name -->
            <div class="row mb-3 align-items-center justify-content-center">
                <label class="col-4 col-form-label text-end">
                    <p>Full Name:</p>
                </label>
                <div class="col-6">
                    <input type="text" name="full_name"
                           class="form-control form-control-sm"
                           required>
                </div>
            </div>

            <!-- Username -->
            <div class="row mb-3 align-items-center justify-content-center">
                <label class="col-4 col-form-label text-end">
                    <p>Username:</p>
                </label>
                <div class="col-6">
                    <input type="text" name="username"
                           class="form-control form-control-sm"
                           required>
                </div>
            </div>

            <!-- Password -->
            <div class="row mb-4  align-items-center justify-content-center">
                <label class="col-4 col-form-label text-end">
                    <p class="">Password:</p>
                </label>
                <div class="col-6">
                    <input type="password" name="password"
                           class="form-control form-control-sm"
                           required>
                </div>
            </div>

            <!-- Button -->
            <div class="text-center mt-3">
                <button type="submit" class="btn btn-primary">Create Child Account</button>
            </div>

        </form>

    </div>
</div>

{% endblock %}
